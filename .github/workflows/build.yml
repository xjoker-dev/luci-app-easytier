name: Build-OpenWrt-EasyTier

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: '请填写发布Releases的版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '请填写发布的说明'
        required: false
        default: ''
      arch_selection:
        description: '选择要构建的架构（用逗号分隔，留空构建全部）'
        required: false
        default: ''
        type: choice
        options:
          - ''  # 全部构建
          - 'aarch64_cortex-a53'
          - 'aarch64_cortex-a72'
          - 'aarch64_generic'
          - 'arm_arm1176jzf-s_vfp'
          - 'arm_arm926ej-s'
          - 'arm_cortex-a15_neon-vfpv4'
          - 'arm_cortex-a5_vfpv4'
          - 'arm_cortex-a7'
          - 'arm_cortex-a7_neon-vfpv4'
          - 'arm_cortex-a8_vfpv3'
          - 'arm_cortex-a9'
          - 'arm_cortex-a9_neon'
          - 'arm_cortex-a9_vfpv3-d16'
          - 'arm_fa526'
          - 'arm_mpcore'
          - 'arm_xscale'
          - 'mips_24kc'
          - 'mips_4kec'
          - 'mips_mips32'
          - 'mipsel_24kc'
          - 'mipsel_24kc_24kf'
          - 'mipsel_74kc'
          - 'mipsel_mips32'
          - 'x86_64'
      custom_arch:
        description: '自定义架构列表（优先级高于选择框，用逗号分隔）'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai
  # 默认架构列表
  DEFAULT_ARCHS: |
    aarch64_cortex-a53
    aarch64_cortex-a72
    aarch64_generic
    arm_arm1176jzf-s_vfp
    arm_arm926ej-s
    arm_cortex-a15_neon-vfpv4
    arm_cortex-a5_vfpv4
    arm_cortex-a7
    arm_cortex-a7_neon-vfpv4
    arm_cortex-a8_vfpv3
    arm_cortex-a9
    arm_cortex-a9_neon
    arm_cortex-a9_vfpv3-d16
    arm_fa526
    arm_mpcore
    arm_xscale
    mips_24kc
    mips_4kec
    mips_mips32
    mipsel_24kc
    mipsel_24kc_24kf
    mipsel_74kc
    mipsel_mips32
    x86_64

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set up build matrix
        id: set-matrix
        run: |
          # 处理架构选择
          if [ -n "${{ github.event.inputs.custom_arch }}" ]; then
            # 使用自定义架构列表
            ARCHS="${{ github.event.inputs.custom_arch }}"
            # 将逗号分隔转换为空格分隔
            ARCHS="${ARCHS//,/ }"
          elif [ -n "${{ github.event.inputs.arch_selection }}" ]; then
            # 使用单选架构
            ARCHS="${{ github.event.inputs.arch_selection }}"
          else
            # 使用默认的全部架构
            ARCHS="${DEFAULT_ARCHS}"
          fi
          
          # 构建JSON矩阵
          echo "Selected architectures: $ARCHS"
          
          # 创建JSON数组
          JSON_ARCHS="["
          FIRST=true
          for arch in $ARCHS; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON_ARCHS+=","
            fi
            JSON_ARCHS+="\"$arch\""
          done
          JSON_ARCHS+="]"
          
          # 创建完整的矩阵JSON
          MATRIX_JSON="{\"arch\":$JSON_ARCHS,\"sdk\":[\"openwrt-22.03\",\"SNAPSHOT\"]}"
          
          echo "Matrix JSON: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Building packages
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: easytier luci-app-easytier
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/

      - name: Create compress files
        run: |
          #tar -zcvf EasyTier-${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci
          zip -j EasyTier-${{ matrix.arch }}-${{ matrix.sdk }}.zip bin/packages/${{ matrix.arch }}/packages_ci/*

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |

             - 其中 **`openwrt-22.03`** 里面是ipk安装包 **`SNAPSHOT`** 里面是apk安装包

             - **`*.apk` 是OpenWrt新版的APK包** 对于apk包跳过证书命令
             `apk add --allow-untrusted luci-app-easytier.apk`

             ${{ github.event.inputs.text }}
           
            tag_name: ${{ env.TAG }}
            files: EasyTier-${{ matrix.arch }}-${{ matrix.sdk }}.zip
